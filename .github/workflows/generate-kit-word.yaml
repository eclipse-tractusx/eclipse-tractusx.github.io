name: Generate Kit Template Documents

on:
  pull_request:
    paths:
      - 'docs-kits/kit-template/**'
      - '!docs-kits/kit-template/**/*.docx'
      - 'scripts/generate_kit_word.py'
      - '.github/workflows/generate-kit-word.yaml'
  workflow_dispatch:
    inputs:
      template:
        description: 'Which template to generate'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - graduated
          - sandbox

jobs:
  # ── Step 1: detect which template directories changed ──────────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      graduated: ${{ steps.filter.outputs.graduated }}
      sandbox: ${{ steps.filter.outputs.sandbox }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            graduated:
              - 'docs-kits/kit-template/graduated/**'
              - '!docs-kits/kit-template/graduated/**/*.docx'
              - 'scripts/generate_kit_word.py'
              - '.github/workflows/generate-kit-word.yaml'
            sandbox:
              - 'docs-kits/kit-template/sandbox/**'
              - '!docs-kits/kit-template/sandbox/**/*.docx'
              - 'scripts/generate_kit_word.py'
              - '.github/workflows/generate-kit-word.yaml'

  # ── Step 2: generate only what changed (or what was requested manually) ────
  generate:
    needs: detect
    runs-on: ubuntu-latest
    # Run when at least one template needs regeneration, considering manual dispatch overrides
    if: |
      needs.detect.outputs.graduated == 'true' ||
      needs.detect.outputs.sandbox == 'true' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libgdk-pixbuf2.0-0 \
            libffi-dev \
            shared-mime-info

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Generate Graduated KIT Word document
        if: |
          needs.detect.outputs.graduated == 'true' ||
          (github.event_name == 'workflow_dispatch' &&
           (github.event.inputs.template == 'graduated' || github.event.inputs.template == 'both'))
        run: |
          echo "Generating graduated template…"
          python scripts/generate_kit_word.py \
            docs-kits/kit-template/graduated \
            docs-kits/kit-template/graduated/kit-template-graduated.docx

      - name: Generate Sandbox KIT Word document
        if: |
          needs.detect.outputs.sandbox == 'true' ||
          (github.event_name == 'workflow_dispatch' &&
           (github.event.inputs.template == 'sandbox' || github.event.inputs.template == 'both'))
        run: |
          echo "Generating sandbox template…"
          python scripts/generate_kit_word.py \
            docs-kits/kit-template/sandbox \
            docs-kits/kit-template/sandbox/kit-template-sandbox.docx

      - name: Check generated files
        run: |
          FAILED=0
          for f in \
            docs-kits/kit-template/graduated/kit-template-graduated.docx \
            docs-kits/kit-template/sandbox/kit-template-sandbox.docx; do
            if [ -f "$f" ]; then
              echo "✓ $f ($(du -h "$f" | cut -f1))"
            fi
          done
          exit $FAILED

      - name: Upload documents as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kit-template-documents
          path: |
            docs-kits/kit-template/graduated/kit-template-graduated.docx
            docs-kits/kit-template/sandbox/kit-template-sandbox.docx
          retention-days: 30
