<svg id="my-svg" width="100%" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="-1 0 550.4375 305" style="max-width: 550.438px; background-color: white;" role="graphics-document document" aria-roledescription="treeView"><style>#my-svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#my-svg .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#my-svg .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#my-svg .error-icon{fill:#552222;}#my-svg .error-text{fill:#552222;stroke:#552222;}#my-svg .edge-thickness-normal{stroke-width:1px;}#my-svg .edge-thickness-thick{stroke-width:3.5px;}#my-svg .edge-pattern-solid{stroke-dasharray:0;}#my-svg .edge-thickness-invisible{stroke-width:0;fill:none;}#my-svg .edge-pattern-dashed{stroke-dasharray:3;}#my-svg .edge-pattern-dotted{stroke-dasharray:2;}#my-svg .marker{fill:#333333;stroke:#333333;}#my-svg .marker.cross{stroke:#333333;}#my-svg svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;}#my-svg p{margin:0;}#my-svg .treeView-node-label{font-size:15px;fill:black;}#my-svg .treeView-node-line{stroke:black;}#my-svg .node .neo-node{stroke:#9370DB;}#my-svg [data-look="neo"].node rect,#my-svg [data-look="neo"].cluster rect,#my-svg [data-look="neo"].node polygon{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#my-svg [data-look="neo"].node path{stroke:#9370DB;stroke-width:1px;}#my-svg [data-look="neo"].node .outer-path{filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#my-svg [data-look="neo"].node .neo-line path{stroke:#9370DB;filter:none;}#my-svg [data-look="neo"].node circle{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#my-svg [data-look="neo"].node circle .state-start{fill:#000000;}#my-svg [data-look="neo"].icon-shape .icon{fill:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#my-svg [data-look="neo"].icon-shape .icon-neo path{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#my-svg :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><g/><g class="tree-view"><text dominant-baseline="middle" class="treeView-node-label" x="5" y="13.5">/</text><line x1="-55" y1="13.5" x2="0" y2="13.5" stroke-width="2" class="treeView-node-line"/><text dominant-baseline="middle" class="treeView-node-label" x="65" y="40.5">Manufacturing Data Model</text><line x1="5" y1="40.5" x2="60" y2="40.5" stroke-width="2" class="treeView-node-line"/><text dominant-baseline="middle" class="treeView-node-label" x="125" y="68">General Production Data (CommonParameter)</text><line x1="65" y1="68" x2="120" y2="68" stroke-width="2" class="treeView-node-line"/><text dominant-baseline="middle" class="treeView-node-label" x="185" y="96">Time Planning (Scheduled &amp; Actual)</text><line x1="125" y1="96" x2="180" y2="96" stroke-width="2" class="treeView-node-line"/><text dominant-baseline="middle" class="treeView-node-label" x="185" y="124">Identification (Work Order, Product, Location)</text><line x1="125" y1="124" x2="180" y2="124" stroke-width="2" class="treeView-node-line"/><text dominant-baseline="middle" class="treeView-node-label" x="185" y="152">Sustainability (CO₂ Footprint)</text><line x1="125" y1="152" x2="180" y2="152" stroke-width="2" class="treeView-node-line"/><line x1="125" y1="82" x2="125" y2="153" stroke-width="2" class="treeView-node-line"/><text dominant-baseline="middle" class="treeView-node-label" x="125" y="180">Process-Specific Data (BillOfProcess)</text><line x1="65" y1="180" x2="120" y2="180" stroke-width="2" class="treeView-node-line"/><text dominant-baseline="middle" class="treeView-node-label" x="185" y="207.5">Machine Assignment &amp; Configuration</text><line x1="125" y1="207.5" x2="180" y2="207.5" stroke-width="2" class="treeView-node-line"/><text dominant-baseline="middle" class="treeView-node-label" x="185" y="235">Quantity Management (Planned, Produced, Scrapped)</text><line x1="125" y1="235" x2="180" y2="235" stroke-width="2" class="treeView-node-line"/><text dominant-baseline="middle" class="treeView-node-label" x="185" y="263">Resource Consumption (Energy &amp; Materials)</text><line x1="125" y1="263" x2="180" y2="263" stroke-width="2" class="treeView-node-line"/><text dominant-baseline="middle" class="treeView-node-label" x="185" y="291">Environmental Impact (Process CO₂)</text><line x1="125" y1="291" x2="180" y2="291" stroke-width="2" class="treeView-node-line"/><line x1="125" y1="194" x2="125" y2="292" stroke-width="2" class="treeView-node-line"/><line x1="65" y1="54" x2="65" y2="181" stroke-width="2" class="treeView-node-line"/><line x1="5" y1="27" x2="5" y2="41.5" stroke-width="2" class="treeView-node-line"/></g></svg>